<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="一个离线可用的日常管理台，包含待办、习惯、喝水、收支和便签。" />
    <title>日常管理台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="topbar" aria-label="今日概览">
        <div>
          <p class="eyebrow" id="today-label">Today</p>
          <h1>日常管理台</h1>
        </div>
      </section>

      <section class="workspace">
        <article class="panel tasks-panel">
          <header class="panel-header">
            <div>
              <p class="panel-kicker">Tasks</p>
              <h2>今日待办</h2>
            </div>
            <div class="panel-actions">
              <button class="icon-button" id="clear-done" type="button" title="清除已完成">
                <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M9 3h6l1 2h5v2H3V5h5l1-2Zm-3 6h12l-1 12H7L6 9Zm3 2 .5 8h5l.5-8H9Z" /></svg>
              </button>
              <button class="save-btn" type="button" title="保存">
                <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-4-4Zm-5 16a3 3 0 1 1 0-6 3 3 0 0 1 0 6Zm-4-8V5h8v6H8Z" /></svg>
              </button>
            </div>
          </header>
          <form class="inline-form" id="task-form">
            <input id="task-input" autocomplete="off" placeholder="写下今天要做的事" />
            <button type="submit">添加</button>
          </form>
          <ul class="item-list" id="task-list"></ul>
        </article>

        <article class="panel">
          <header class="panel-header">
            <div>
              <p class="panel-kicker">Habits</p>
              <h2>习惯打卡</h2>
            </div>
            <div class="panel-actions">
              <button class="icon-button" id="add-habit" type="button" title="添加习惯">
                <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6V5Z" /></svg>
              </button>
              <button class="save-btn" type="button" title="保存">
                <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-4-4Zm-5 16a3 3 0 1 1 0-6 3 3 0 0 1 0 6Zm-4-8V5h8v6H8Z" /></svg>
              </button>
            </div>
          </header>
          <div class="habit-grid" id="habit-list"></div>
        </article>

        <article class="panel">
          <header class="panel-header">
            <div>
              <p class="panel-kicker">Water</p>
              <h2>喝水记录</h2>
            </div>
            <div class="panel-actions">
              <button class="icon-button" id="reset-water" type="button" title="重置喝水">
                <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 5V2L7 7l5 5V9a5 5 0 1 1-4.6 7H5.3A7 7 0 1 0 12 5Z" /></svg>
              </button>
              <button class="save-btn" type="button" title="保存">
                <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-4-4Zm-5 16a3 3 0 1 1 0-6 3 3 0 0 1 0 6Zm-4-8V5h8v6H8Z" /></svg>
              </button>
            </div>
          </header>
          <div class="water-meter">
            <div class="water-ring" id="water-ring"><span id="water-number">0</span></div>
            <div class="water-actions">
              <button type="button" id="water-minus">-1</button>
              <button type="button" id="water-plus">+1 杯</button>
            </div>
          </div>
        </article>

        <article class="panel finance-panel">
          <header class="panel-header">
            <div>
              <p class="panel-kicker">Money</p>
              <h2>今日收支</h2>
            </div>
            <div class="panel-actions">
              <strong id="finance-total">¥0</strong>
              <button class="save-btn" type="button" title="保存">
                <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-4-4Zm-5 16a3 3 0 1 1 0-6 3 3 0 0 1 0 6Zm-4-8V5h8v6H8Z" /></svg>
              </button>
            </div>
          </header>
          <form class="finance-form" id="finance-form">
            <select id="finance-type" aria-label="收支类型">
              <option value="expense">支出</option>
              <option value="income">收入</option>
            </select>
            <input id="finance-name" autocomplete="off" placeholder="项目" />
            <input id="finance-amount" inputmode="decimal" autocomplete="off" placeholder="金额" />
            <button type="submit">记录</button>
          </form>
          <ul class="item-list" id="finance-list"></ul>
        </article>

        <article class="panel note-panel">
          <header class="panel-header">
            <div>
              <p class="panel-kicker">Notes</p>
              <h2>快速便签</h2>
            </div>
            <div class="panel-actions">
              <button class="icon-button" id="copy-note" type="button" title="复制便签">
                <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M8 7a3 3 0 0 1 3-3h7a3 3 0 0 1 3 3v7a3 3 0 0 1-3 3v-2a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1h-7a1 1 0 0 0-1 1H8Zm-5 4a3 3 0 0 1 3-3h7a3 3 0 0 1 3 3v7a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3v-7Zm3-1a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1v-7a1 1 0 0 0-1-1H6Z" /></svg>
              </button>
              <button class="save-btn" type="button" title="保存">
                <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-4-4Zm-5 16a3 3 0 1 1 0-6 3 3 0 0 1 0 6Zm-4-8V5h8v6H8Z" /></svg>
              </button>
            </div>
          </header>
          <textarea id="daily-note" placeholder="临时想法、购物清单、今天要记住的事"></textarea>
          <p class="status" id="save-status">已自动保存到本机浏览器</p>
        </article>

        <article class="panel history-panel">
          <header class="panel-header history-header">
            <div>
              <p class="panel-kicker">History</p>
              <h2>历史记录</h2>
            </div>
            <select id="history-date" aria-label="选择历史日期"></select>
          </header>
          <div class="history-summary" id="history-summary"></div>
          <div class="history-detail">
            <section>
              <h3>待办</h3>
              <ul class="mini-list" id="history-tasks"></ul>
            </section>
            <section>
              <h3>习惯</h3>
              <ul class="mini-list" id="history-habits"></ul>
            </section>
            <section>
              <h3>收支</h3>
              <ul class="mini-list" id="history-finances"></ul>
            </section>
            <section>
              <h3>便签</h3>
              <p class="history-note" id="history-note">没有便签</p>
            </section>
          </div>
        </article>
      </section>

      <div class="storage-actions" aria-label="数据管理">
        <button type="button" id="export-data">导出备份</button>
        <button type="button" id="import-data">导入恢复</button>
        <button type="button" id="reset-today">清空今日</button>
        <input id="import-file" type="file" accept="application/json" hidden />
      </div>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
